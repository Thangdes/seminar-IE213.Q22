name: CD - Food Ordering App

on:
  workflow_run:
    workflows:
      - CI - Food Ordering App
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: VERCEL_DEPLOY_HOOK_URL"
            exit 1
          fi

          if echo "$VERCEL_DEPLOY_HOOK_URL" | grep -q ' ' ; then
            echo "VERCEL_DEPLOY_HOOK_URL contains whitespace — please fix the secret value"
            exit 1
          fi

          echo "VERCEL hook URL length: $(printf '%s' "$VERCEL_DEPLOY_HOOK_URL" | wc -c)"

          resp=$(curl -sS -w "\n%{http_code}" -X POST "$VERCEL_DEPLOY_HOOK_URL" || true)
          http_code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "HTTP status: $http_code"
          echo "Response body:"
          echo "$body"

          if [ "${http_code:0:1}" != "2" ]; then
            exit 1
          fi

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

          if echo "$RENDER_DEPLOY_HOOK_URL" | grep -q ' ' ; then
            echo "RENDER_DEPLOY_HOOK_URL contains whitespace — please fix the secret value"
            exit 1
          fi

          echo "RENDER hook URL length: $(printf '%s' "$RENDER_DEPLOY_HOOK_URL" | wc -c)"

          resp=$(curl -sS -w "\n%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL" || true)
          http_code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "HTTP status: $http_code"
          echo "Response body:"
          echo "$body"

          if [ "${http_code:0:1}" != "2" ]; then
            exit 1
          fi
