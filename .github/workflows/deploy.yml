# =============================================
# deploy.yml — GitHub Actions CI/CD Pipeline
# Trigger: push lên nhánh main
# Mục đích: Build + verify frontend & backend
# =============================================

name: CI/CD Pipeline — Food Ordering App

# ===== KHI NÀO CHẠY WORKFLOW =====
# Chỉ chạy khi push code lên nhánh main
on:
  push:
    branches:
      - main

# ===== DANH SÁCH JOBS =====
jobs:
  # ----- JOB 1: BUILD & VERIFY FRONTEND -----
  # Cài dependencies, build React app, kiểm tra output
  build-frontend:
    name: 🖥️ Build Frontend
    runs-on: ubuntu-latest

    # Các bước thực hiện tuần tự
    steps:
      # Bước 1: Checkout code từ repo về runner
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      # Bước 2: Cài đặt Node.js phiên bản 20
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Bước 3: Cài đặt dependencies frontend
      - name: 📦 Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Bước 4: Build ứng dụng React (tạo thư mục dist/)
      - name: 🔨 Build frontend
        working-directory: frontend
        run: npm run build

      # Bước 5: Kiểm tra thư mục dist/ đã được tạo
      - name: ✅ Verify build output
        working-directory: frontend
        run: |
          echo "=== Kiểm tra thư mục build ==="
          ls -la dist/
          echo "=== Kiểm tra file index.html ==="
          test -f dist/index.html && echo "✅ index.html exists" || exit 1
          echo "=== Kiểm tra thư mục assets ==="
          ls -la dist/assets/ || echo "⚠️ No assets directory"
          echo "✅ Frontend build thành công!"

  # ----- JOB 2: VERIFY BACKEND -----
  # Cài dependencies, kiểm tra cú pháp server
  build-backend:
    name: 🖧 Verify Backend
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout code
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      # Bước 2: Setup Node.js
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # Bước 3: Cài dependencies backend
      - name: 📦 Install backend dependencies
        working-directory: backend
        run: npm ci

      # Bước 4: Kiểm tra cú pháp server.js (không chạy thật vì cần MongoDB)
      - name: ✅ Verify server syntax
        working-directory: backend
        run: |
          echo "=== Kiểm tra cú pháp ES modules ==="
          node --check server.js && echo "✅ server.js syntax OK"
          node --check routes/foods.js && echo "✅ routes/foods.js syntax OK"
          node --check routes/orders.js && echo "✅ routes/orders.js syntax OK"
          node --check controllers/foodController.js && echo "✅ foodController.js syntax OK"
          node --check controllers/orderController.js && echo "✅ orderController.js syntax OK"
          node --check models/Food.js && echo "✅ Food.js syntax OK"
          node --check models/Order.js && echo "✅ Order.js syntax OK"
          node --check middleware/errorHandler.js && echo "✅ errorHandler.js syntax OK"
          echo "✅ Backend verification thành công!"
